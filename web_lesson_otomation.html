<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Mobil cihazlar için çok önemli -->
    <title>Ders Otomasyonu Pro</title>
    <link rel="stylesheet" href="style.css">
    <!-- Dış Kütüphaneler: Grafik ve Resim Olarak İndirme İçin -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-ust">
            <button class="menu-ikon" onclick="menuAcKapa()">☰</button>
            <button class="tema-buton" onclick="temaDegistir()" id="temaIkon">☀️</button>
        </div>
        <div class="nav-linkler" id="navLinkler">
            <a href="web_lesson_otomation.html">🏠 Ana Sayfa</a>
            <a href="about.html">👩‍💻 Hakkımda</a>
            <a href="hedefler.html">🚀 Hedeflerim</a>
            <a href="iletisim.html">✉️ İletişim</a>
        </div>
    </nav>

    <div class="ana-konteyner">
        <h1 class="baslik">📚 Ders Ekleme Otomasyonu</h1>
        <hr class="ayrac">

        <div class="form-alani">
            <input type="text" id="ders" placeholder="Ders Adı">
            <input type="text" id="ogr" placeholder="Öğrenci Adı">
            <input type="text" id="hoca" placeholder="Öğretmen Adı">
            
            <select id="gun">
                <option value="">Gün Seçiniz</option>
                <option value="Pazartesi">Pazartesi</option>
                <option value="Salı">Salı</option>
                <option value="Çarşamba">Çarşamba</option>
                <option value="Perşembe">Perşembe</option>
                <option value="Cuma">Cuma</option>
                <option value="Cumartesi">Cumartesi</option>
                <option value="Pazar">Pazar</option>
            </select>

            <select id="saat">
                <option value="">Saat Seçiniz</option>
                <option value="09:00 - 10:00">09:00 - 10:00</option>
                <option value="10:00 - 11:00">10:00 - 11:00</option>
                <option value="11:00 - 12:00">11:00 - 12:00</option>
                <option value="12:00 - 13:00">12:00 - 13:00</option>
                <option value="13:00 - 14:00">13:00 - 14:00</option>
                <option value="14:00 - 15:00">14:00 - 15:00</option>
                <option value="15:00 - 16:00">15:00 - 16:00</option>
                <option value="16:00 - 17:00">16:00 - 17:00</option>
            </select>
        </div>

        <div style="text-align: center; margin-top: 15px;">
            <button id="btnKaydet" class="btn-birincil">💾 Kaydet</button> 
            <button id="btnGoster" class="btn-ikincil">📅 Programı Göster</button>
        </div>
        
        <div id="ekran" style="margin-top: 30px; display: none;">
            
            <!-- YENİ: Pasta Grafiği Alanı -->
            <div style="height: 300px; margin-bottom: 30px;">
                <h3 style="text-align: center; margin-bottom: 10px;">📊 Günlere Göre Ders Yoğunluğu</h3>
                <canvas id="dersGrafigi"></canvas>
            </div>

            <h3 style="text-align: center;">Haftalık Ders Programı Matrisi</h3>
            <div class="tablo-sarmalayici">
                <table id="programTablosu">
                    <thead>
                        <tr>
                            <th>Saat / Gün</th><th>Pzt</th><th>Sal</th><th>Çrş</th><th>Prş</th><th>Cum</th><th>Cts</th><th>Pzr</th>
                        </tr>
                    </thead>
                    <tbody id="tabloGovdesi"></tbody>
                </table>
            </div>

            <!-- YENİ: İndirme Butonu -->
            <div style="text-align: center; margin-top: 20px;">
                <button id="btnIndir" class="btn-birincil" style="background: linear-gradient(90deg, #28a745, #218838); color: white;">📥 Programı Resim Olarak İndir</button>
            </div>

        </div>
    </div>

    <!-- Scriptleri çağırıyoruz -->
    <script src="ui.js"></script>
    <script src="web_lesson_otomation.js"></script>

</body>
</html>
